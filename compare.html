<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<title>Compare · VEGFA experiments</title>
<style>
:root{--bg:#0d1117;--bg2:#010409;--card:#161b22;--border:#30363d;
 --text:#e6edf3;--muted:#7d8590;--accent:#76b900;--blue:#58a6ff}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);
 font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,Roboto,sans-serif;
 font-size:14px;height:100vh;overflow:hidden}
header{background:var(--bg2);border-bottom:1px solid var(--border);
 padding:10px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
header .logo{color:var(--accent);font-weight:700;font-size:14.5px;letter-spacing:.6px;
 font-family:'SF Mono',Consolas,monospace}
header .sep{color:var(--border)}
header label{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.5px}
header select{background:var(--card);color:var(--text);border:1px solid var(--border);
 border-radius:6px;padding:6px 12px;font-size:13px;font-family:inherit;cursor:pointer}
header select:hover{border-color:var(--accent)}
header .swap{background:var(--card);color:var(--text);border:1px solid var(--border);
 border-radius:6px;padding:6px 12px;font-size:13px;font-family:inherit;cursor:pointer}
header .swap:hover{border-color:var(--accent);color:var(--accent)}
header .right{margin-left:auto;display:flex;gap:14px;align-items:center}
header a{color:var(--blue);text-decoration:none;font-size:12.5px}
header a:hover{text-decoration:underline}
.panels{display:grid;grid-template-columns:1fr 1fr;gap:8px;
 height:calc(100vh - 52px);padding:8px}
.panel{position:relative;border:1px solid var(--border);border-radius:8px;overflow:hidden;background:#0a0e13}
.panel .tag{position:absolute;top:8px;left:8px;z-index:10;background:rgba(13,17,23,.85);
 color:var(--accent);border:1px solid var(--border);padding:3px 10px;border-radius:10px;
 font-size:11px;font-family:'SF Mono',monospace;letter-spacing:.4px;font-weight:600;
 pointer-events:none}
.panel iframe{border:0;width:100%;height:100%}
@media(max-width:900px){
 .panels{grid-template-columns:1fr;grid-template-rows:1fr 1fr}
}
</style>
</head><body>

<header>
 <div class="logo">EVO2 · CARBON · COMPARE</div>
 <div class="sep">|</div>
 <label>Left</label>
 <select id="left">
  <option value="upstream-orf.html?compact=1">E1 · Evo2 upstream ORF (7)</option>
  <option value="cds.html?compact=1">E2 · Evo2 CDS (5)</option>
  <option value="carbon-protgpt2.html?compact=1" selected>E3 · Carbon + ProtGPT2 (14)</option>
 </select>
 <button class="swap" id="swap">⇄ Swap</button>
 <label>Right</label>
 <select id="right">
  <option value="upstream-orf.html?compact=1">E1 · Evo2 upstream ORF (7)</option>
  <option value="cds.html?compact=1" selected>E2 · Evo2 CDS (5)</option>
  <option value="carbon-protgpt2.html?compact=1">E3 · Carbon + ProtGPT2 (14)</option>
 </select>
 <div class="right">
  <a href="index.html">← Back to index</a>
 </div>
</header>

<div class="panels">
 <div class="panel">
  <span class="tag" id="tag-left">LEFT</span>
  <iframe id="if-left" src=""></iframe>
 </div>
 <div class="panel">
  <span class="tag" id="tag-right">RIGHT</span>
  <iframe id="if-right" src=""></iframe>
 </div>
</div>

<script>
const sl = document.getElementById("left");
const sr = document.getElementById("right");
const il = document.getElementById("if-left");
const ir = document.getElementById("if-right");
const tl = document.getElementById("tag-left");
const tr = document.getElementById("tag-right");
function applyL(){ il.src = sl.value; tl.textContent = "LEFT · " + sl.options[sl.selectedIndex].text; }
function applyR(){ ir.src = sr.value; tr.textContent = "RIGHT · " + sr.options[sr.selectedIndex].text; }
sl.onchange = applyL; sr.onchange = applyR;
document.getElementById("swap").onclick = () => {
 const a = sl.value, b = sr.value;
 sl.value = b; sr.value = a;
 applyL(); applyR();
};
applyL(); applyR();
</script>
</body></html>
